<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Увійти</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b0b; --bg-elevated: #111111; --border: #222222; --border-hover: #333333;
      --text-primary: #ffffff; --text-secondary: #888888; --radius: 8px;
      --font-sans: 'Inter', system-ui, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text-primary); font-family: var(--font-sans);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem;
    }
    .card { width: 100%; max-width: 380px; }
    .brand { font-weight: 700; font-size: 1.2rem; margin-bottom: 2rem; text-align: center; }
    .form-box {
      background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.75rem;
    }
    h1 { font-size: 1.15rem; font-weight: 600; margin-bottom: 1.25rem; }
    .error {
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); color: #f87171;
      border-radius: var(--radius); padding: 0.65rem 0.9rem; font-size: 0.85rem; margin-bottom: 1.1rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.35rem; }
    .form-group input {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 0.6rem 0.75rem; color: var(--text-primary); font-family: var(--font-sans); font-size: 0.9rem;
    }
    .form-group input:focus { outline: none; border-color: var(--border-hover); }
    .btn {
      width: 100%; background: var(--text-primary); color: var(--bg); border: none; border-radius: var(--radius);
      padding: 0.7rem; font-weight: 600; font-size: 0.9rem; cursor: pointer; margin-top: 0.25rem;
    }
    .btn:hover { opacity: 0.85; }
    .divider {
      display: flex; align-items: center; gap: 0.75rem; margin: 1.25rem 0;
      color: var(--text-secondary); font-size: 0.75rem; text-transform: uppercase;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .telegram-wrap { display: flex; justify-content: center; }
    .switch-link { text-align: center; margin-top: 1.25rem; font-size: 0.85rem; color: var(--text-secondary); }
    .switch-link a { color: var(--text-primary); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">AlexiHub // Community</div>
    <div class="form-box">
      <h1>Увійти</h1>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/community/login">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Пароль</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn">Увійти</button>
      </form>

      {% if bot_username %}
      <div class="divider">або</div>
      <div class="telegram-wrap">
        <script async src="https://telegram.org/js/telegram-widget.js?22"
                data-telegram-login="{{ bot_username }}"
                data-size="large"
                data-auth-url="/community/telegram-callback"
                data-request-access="write"></script>
      </div>
      {% endif %}

      <div class="switch-link">Ще нема акаунту? <a href="/community/register">Зареєструватись</a></div>
    </div>
  </div>
</body>
</html>
